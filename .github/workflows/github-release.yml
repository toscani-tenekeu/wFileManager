name: GitHub Release

on:
  push:
    branches: [main]
    paths:
      - package.json
      - bun.lock
      - bun.lockb
      - src/**
      - deploy/**
      - supabase/**
      - public/**
      - .github/workflows/github-release.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Release $TAG already exists; skipping."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release assets
        if: steps.version.outputs.publish == 'true'
        run: |
          set -Eeuo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets
          git archive --format=tar.gz --prefix="wFileManager-$VERSION/" -o "release-assets/wfilemanager-$VERSION.tar.gz" HEAD
          cp deploy/install.sh release-assets/install.sh
          cp deploy/update.sh release-assets/update.sh
          cp deploy/wfilemanager.service release-assets/wfilemanager.service
          cp 'deploy/wfilemanager-updater@.service' release-assets/wfilemanager-updater@.service
          if [[ -f deploy/migrate-existing-vps.sh ]]; then
            cp deploy/migrate-existing-vps.sh release-assets/migrate-existing-vps.sh
          fi
          (
            cd release-assets
            sha256sum * | sort -k2 > SHA256SUMS
          )
          cat > RELEASE_NOTES.md <<EOF
          wFileManager $VERSION

          Automated GitHub release generated from main.

          Main assets:
          - wfilemanager-$VERSION.tar.gz
          - SHA256SUMS
          - install.sh
          - update.sh
          - wfilemanager.service
          - wfilemanager-updater@.service

          The Supabase stable channel remains the source used by the official installer/updater.
          EOF

      - name: Create GitHub Release
        if: steps.version.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -Eeuo pipefail
          gh release create "$TAG" release-assets/* \
            --target "$GITHUB_SHA" \
            --title "wFileManager $VERSION" \
            --notes-file RELEASE_NOTES.md
