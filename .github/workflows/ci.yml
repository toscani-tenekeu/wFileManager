name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CI_LOG_DIR: ci-logs

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: mkdir -p "$CI_LOG_DIR"
      - run: bun install --frozen-lockfile
      - name: Build
        id: build
        continue-on-error: true
        run: bun run build >"$CI_LOG_DIR/build.log" 2>&1
      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: bun run typecheck >"$CI_LOG_DIR/typecheck.log" 2>&1
      - name: Security tests
        id: tests
        continue-on-error: true
        run: bun run test >"$CI_LOG_DIR/tests.log" 2>&1
      - name: Shell validation
        id: shell
        continue-on-error: true
        run: |
          {
            bash -n deploy/install.sh
            bash -n deploy/update.sh
            bash -n deploy/uninstall.sh
            bash -n deploy/wfilemanager-reset-admin-password
            bash -n deploy/wfilemanager-heartbeat
            bash -n deploy/wfilemanager-recovery-kit
          } >"$CI_LOG_DIR/shell.log" 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-logs
          path: ci-logs
      - name: Enforce results
        if: always()
        run: |
          cat "$CI_LOG_DIR/build.log" || true
          cat "$CI_LOG_DIR/typecheck.log" || true
          cat "$CI_LOG_DIR/tests.log" || true
          cat "$CI_LOG_DIR/shell.log" || true
          [[ "${{ steps.build.outcome }}" == "success" ]]
          [[ "${{ steps.typecheck.outcome }}" == "success" ]]
          [[ "${{ steps.tests.outcome }}" == "success" ]]
          [[ "${{ steps.shell.outcome }}" == "success" ]]
